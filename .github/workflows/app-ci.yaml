name: Production GitOps CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'gitops/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

permissions:
  id-token: write
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:

  # ─────────────────────────────────────────
  # PR VALIDATION
  # ─────────────────────────────────────────
  pr-validation:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfiles
        run: |
          for svc in book frontend search user; do
            docker run --rm -i hadolint/hadolint < services/$svc/Dockerfile || true
          done

      - name: Scan secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}

  # ─────────────────────────────────────────
  # DETECT CHANGES
  # ─────────────────────────────────────────
  detect-changes:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      book:     ${{ steps.filter.outputs.book }}
      frontend: ${{ steps.filter.outputs.frontend }}
      search:   ${{ steps.filter.outputs.search }}
      user:     ${{ steps.filter.outputs.user }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            book:     ['services/book/**']
            frontend: ['services/frontend/**']
            search:   ['services/search/**']
            user:     ['services/user/**']

  # ─────────────────────────────────────────
  # BUILD & PUSH
  # ─────────────────────────────────────────
  build:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      fail-fast: false
      matrix:
        service: [book, frontend, search, user]

    steps:
      - uses: actions/checkout@v4

      - name: Check if service changed
        id: check
        run: |
          case "${{ matrix.service }}" in
            book)     echo "changed=${{ needs.detect-changes.outputs.book }}"     >> $GITHUB_OUTPUT ;;
            frontend) echo "changed=${{ needs.detect-changes.outputs.frontend }}" >> $GITHUB_OUTPUT ;;
            search)   echo "changed=${{ needs.detect-changes.outputs.search }}"   >> $GITHUB_OUTPUT ;;
            user)     echo "changed=${{ needs.detect-changes.outputs.user }}"     >> $GITHUB_OUTPUT ;;
          esac

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Set image tag
        if: steps.check.outputs.changed == 'true'
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-8)
          if [[ "${GITHUB_REF##*/}" == "main" ]]; then
            echo "TAG=prod-${SHA}" >> $GITHUB_ENV
          else
            echo "TAG=dev-${SHA}" >> $GITHUB_ENV
          fi

      - name: Configure AWS (OIDC)
        if: steps.check.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::635457411372:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: steps.check.outputs.changed == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        if: steps.check.outputs.changed == 'true'
        run: |
          docker build \
            -t $ECR_REGISTRY/${{ matrix.service }}:$TAG \
            ./services/${{ matrix.service }}
          docker push $ECR_REGISTRY/${{ matrix.service }}:$TAG

      - name: Trivy Scan
        if: steps.check.outputs.changed == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:${{ env.TAG }}
          severity: CRITICAL,HIGH
          exit-code: 0

  # ─────────────────────────────────────────
  # GITOPS UPDATE
  # ─────────────────────────────────────────
  gitops-update:
    runs-on: ubuntu-latest
    needs: [build, detect-changes]
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      !contains(needs.*.result, 'failure')

    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Set env + tag
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-8)
          if [[ "${GITHUB_REF##*/}" == "main" ]]; then
            echo "ENV=prod" >> $GITHUB_ENV
            echo "TAG=prod-${SHA}" >> $GITHUB_ENV
          else
            echo "ENV=dev" >> $GITHUB_ENV
            echo "TAG=dev-${SHA}" >> $GITHUB_ENV
          fi

      - name: Add Helm repos
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo add ebs-csi https://kubernetes-sigs.github.io/aws-ebs-csi-driver
          helm repo add metrics-server https://kubernetes-sigs.github.io/metrics-server/
          helm repo add autoscaler https://kubernetes.github.io/autoscaler
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update

      - name: Update GitOps values
        run: |
          FILE=gitops/environments/$ENV/values.yaml

          update() {
            SERVICE=$1
            CHANGED=$2
            if [[ "$CHANGED" == "true" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              echo "Updating $SERVICE → $TAG"
              yq -i ".$SERVICE.tag = \"$TAG\"" $FILE
            fi
          }

          update frontend "${{ needs.detect-changes.outputs.frontend }}"
          update book     "${{ needs.detect-changes.outputs.book }}"
          update search   "${{ needs.detect-changes.outputs.search }}"
          update user     "${{ needs.detect-changes.outputs.user }}"

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add gitops/environments/$ENV/values.yaml
          git commit -m "gitops: update $ENV tags to $TAG [skip ci]" || echo "No changes"
          git push

      - name: Summary
        run: |
          echo "============================================"
          echo "  GITOPS UPDATE COMPLETE ✅"
          echo "  Environment : $ENV"
          echo "  Updated Tag : $TAG"
          echo "  ArgoCD will auto-sync"
          echo "============================================"