name: Production GitOps CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'gitops/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

permissions:
  id-token: write
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:

  # ─────────────────────────────────────────
  # PR VALIDATION
  # ─────────────────────────────────────────
  pr-validation:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfiles
        run: |
          for svc in reservation frontend search user; do
            docker run --rm -i hadolint/hadolint < services/$svc/Dockerfile || true
          done

      - name: Scan secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}

  # ─────────────────────────────────────────
  # DETECT CHANGES
  # ─────────────────────────────────────────
  detect-changes:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      reservation: ${{ steps.filter.outputs.reservation }}
      frontend:    ${{ steps.filter.outputs.frontend }}
      search:      ${{ steps.filter.outputs.search }}
      user:        ${{ steps.filter.outputs.user }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            reservation: ['services/reservation/**']
            frontend:    ['services/frontend/**']
            search:      ['services/search/**']
            user:        ['services/user/**']

  # ─────────────────────────────────────────
  # BUILD & PUSH
  # ─────────────────────────────────────────
  build:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      fail-fast: false
      matrix:
        service: [reservation, frontend, search, user]
    steps:
      - uses: actions/checkout@v4

      - name: Check if service changed
        id: check
        run: |
          case "${{ matrix.service }}" in
            reservation) echo "changed=${{ needs.detect-changes.outputs.reservation }}" >> $GITHUB_OUTPUT ;;
            frontend)    echo "changed=${{ needs.detect-changes.outputs.frontend }}"    >> $GITHUB_OUTPUT ;;
            search)      echo "changed=${{ needs.detect-changes.outputs.search }}"      >> $GITHUB_OUTPUT ;;
            user)        echo "changed=${{ needs.detect-changes.outputs.user }}"        >> $GITHUB_OUTPUT ;;
          esac
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Set image tag
        if: steps.check.outputs.changed == 'true'
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-8)
          if [[ "${GITHUB_REF##*/}" == "main" ]]; then
            echo "TAG=prod-${SHA}" >> $GITHUB_ENV
          else
            echo "TAG=dev-${SHA}" >> $GITHUB_ENV
          fi

      - name: Configure AWS (OIDC)
        if: steps.check.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::635457411372:role/github-actions-ecr-role
          aws-region: us-east-1

      - name: Login to ECR
        if: steps.check.outputs.changed == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        if: steps.check.outputs.changed == 'true'
        run: |
          docker build \
            -t $ECR_REGISTRY/${{ matrix.service }}:$TAG \
            ./services/${{ matrix.service }}
          docker push $ECR_REGISTRY/${{ matrix.service }}:$TAG

      - name: Trivy Scan
        if: steps.check.outputs.changed == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:${{ env.TAG }}
          severity: CRITICAL,HIGH
          exit-code: 0

  # ─────────────────────────────────────────
  # GITOPS UPDATE
  # ArgoCD auto-detects this change and deploys
  # No manual sync needed — automated + selfHeal
  # ─────────────────────────────────────────
  gitops-update:
    runs-on: ubuntu-latest
    needs: build
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      !contains(needs.*.result, 'failure')
    steps:
      - uses: actions/checkout@v4

      - name: Set env + tag
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-8)
          if [[ "${GITHUB_REF##*/}" == "main" ]]; then
            echo "ENV=prod" >> $GITHUB_ENV
            echo "TAG=prod-${SHA}" >> $GITHUB_ENV
          else
            echo "ENV=dev" >> $GITHUB_ENV
            echo "TAG=dev-${SHA}" >> $GITHUB_ENV
          fi

      - name: Update GitOps values
        run: |
          sed -i "s/tag:.*/tag: $TAG/" gitops/environments/$ENV/values.yaml

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -am "gitops: update $ENV image tag to $TAG [skip ci]" || echo "No changes"
          git push

      - name: Summary
        run: |
          echo "============================================"
          echo "  GITOPS UPDATE COMPLETE ✅"
          echo "  Environment : $ENV"
          echo "  Image Tag   : $TAG"
          echo "  ArgoCD will auto-sync within 3 minutes"
          echo "============================================"
