apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-search
  labels:
    {{- include "booking.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: search
  ports:
    - name: http
      port: 3003        # ← was 3000, your deployment runs on 3003
      targetPort: http
      protocol: TCP