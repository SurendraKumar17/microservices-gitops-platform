apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-book
  labels:
    {{- include "booking.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: book
  ports:
    - name: http
      port: 3001
      targetPort: http    # ← reference named port from deployment, not number
      protocol: TCP