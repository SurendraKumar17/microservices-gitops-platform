apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    {{- include "booking.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: 3000        # ← was 80, your ingress routes to port 3000
      targetPort: http
      protocol: TCP