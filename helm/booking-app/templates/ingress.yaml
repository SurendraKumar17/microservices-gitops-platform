apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: booking-app-ingress
  namespace: dev
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80  
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: reservation
                port:
                  number: 3001   
          - path: /search
            pathType: Prefix
            backend:
              service:
                name: search
                port:
                  number: 3000   
          - path: /user
            pathType: Prefix
            backend:
              service:
                name: user
                port:
                  number: 3002    