apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ .Release.Name }}-book
  labels:
    {{- include "booking.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.book.replicas }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: book
  template:
    metadata:
      labels:
        app: book
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: {{ .Release.Name }}-book
      containers:
      - name: book
        image: {{ .Values.global.registry }}/book:{{ .Values.book.tag }}
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: SERVICE_NAME
          value: "book"
        - name: NODE_ENV
          value: {{ .Values.global.env }}
        - name: DB_HOST
          value: {{ .Values.postgres.host | quote }}
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "bookingdb"
        - name: DB_USER
          value: {{ .Values.postgres.user | quote }}
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
          timeoutSeconds: 3
  strategy:
    canary:
      steps:
      - setWeight: 10
      - pause: {duration: 2m}
      - setWeight: 50
      - pause: {duration: 2m}
      - setWeight: 100