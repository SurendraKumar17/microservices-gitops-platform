apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-book
  labels:
    {{- include "booking.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.book.replicas }}
  selector:
    matchLabels:
      app: book
  template:
    metadata:
      labels:
        app: book
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: book
        image: {{ .Values.global.registry }}/book:{{ .Values.book.tag }}
        imagePullPolicy: IfNotPresent

        ports:
        - name: http
          containerPort: 3001

        env:
        - name: PORT
          value: "3001"

        - name: SERVICE_NAME
          value: "book"

        - name: DB_HOST
          value: {{ .Values.postgres.host }}
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "bookings"
        - name: DB_USER
          value: {{ .Values.postgres.user }}
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /ready
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5

        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 5"]