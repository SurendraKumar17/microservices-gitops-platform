apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-search
  labels:
    {{- include "booking.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.search.replicas }}
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: search
  template:
    metadata:
      labels:
        app: search
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3003"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: {{ .Release.Name }}-search

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: search

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: search
                topologyKey: kubernetes.io/hostname

      containers:
      - name: search
        image: {{ .Values.global.registry }}/search:{{ .Values.search.tag }}
        imagePullPolicy: IfNotPresent

        ports:
        - name: http
          containerPort: 3003

        env:
        - name: PORT
          value: "3003"
        - name: SERVICE_NAME
          value: "search"
        - name: NODE_ENV
          value: {{ .Values.global.env }}
        - name: DB_NAME
          value: "flights"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password

        envFrom:
        - configMapRef:
            name: {{ .Release.Name }}-config

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 5