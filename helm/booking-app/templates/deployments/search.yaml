apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-search
  labels:
    {{- include "booking.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.search.replicas }}
  selector:
    matchLabels:
      app: search
  template:
    metadata:
      labels:
        app: search
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: search
        image: {{ .Values.global.registry }}/search:{{ .Values.search.tag }}
        imagePullPolicy: IfNotPresent

        ports:
        - name: http
          containerPort: 3003

        env:
        - name: PORT
          value: "3003"
        - name: SERVICE_NAME
          value: "search"

        - name: DB_HOST
          value: {{ .Values.postgres.host }}
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "flights"
        - name: DB_USER
          value: {{ .Values.postgres.user }}
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 15
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /ready   # ✅ FIXED
            port: 3003
          initialDelaySeconds: 10
          periodSeconds: 5

        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 5"]