apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    {{- include "booking.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: {{ .Release.Name }}-frontend

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: frontend

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: frontend
                topologyKey: kubernetes.io/hostname

      containers:
      - name: frontend
        image: {{ .Values.global.registry }}/frontend:{{ .Values.frontend.tag }}
        imagePullPolicy: IfNotPresent

        ports:
        - name: http
          containerPort: 3000

        env:
        - name: PORT
          value: "3000"
        - name: SERVICE_NAME
          value: "frontend"
        - name: NODE_ENV
          value: {{ .Values.global.env }}

        envFrom:
        - configMapRef:
            name: {{ .Release.Name }}-config

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 5

        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
          timeoutSeconds: 3

        startupProbe:
          httpGet:
            path: /health
            port: 3000
          failureThreshold: 30
          periodSeconds: 10

        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 5"]

        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]

        volumeMounts:
        - name: tmp
          mountPath: /tmp

      volumes:
      - name: tmp
        emptyDir: {}

      securityContext:
        fsGroup: 1000

  strategy:
    canary:
      analysis:
        templates:
        - templateName: {{ .Release.Name }}-success-rate
        startingStep: 2        # ← start after first pause
        args:
        - name: namespace
          value: {{ .Release.Namespace }}
      steps:
      - setWeight: 10
      - pause: {duration: 2m}  # ← analysis starts after this
      - setWeight: 50
      - pause: {duration: 2m}
      - setWeight: 100