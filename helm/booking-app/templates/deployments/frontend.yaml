apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    {{- include "booking.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: frontend
        image: {{ .Values.global.registry }}/frontend:{{ .Values.frontend.tag }}
        imagePullPolicy: IfNotPresent

        ports:
        - name: http
          containerPort: 3000

        env:
        - name: PORT
          value: "{{ .Values.frontend.port }}"
        - name: SERVICE_NAME
          value: "frontend"

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /ready   # ✅ FIXED
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5

        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 5"]