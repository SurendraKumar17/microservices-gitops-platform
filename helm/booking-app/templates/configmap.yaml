apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "booking.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.global.env }}
  DB_HOST: {{ .Values.postgres.host }}
  DB_PORT: "5432"
  DB_USER: {{ .Values.postgres.user }}