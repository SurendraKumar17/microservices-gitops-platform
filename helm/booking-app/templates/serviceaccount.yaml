{{- range $service := list "book" "user" "search" "frontend" }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $.Release.Name }}-{{ $service }}
  labels:
    {{- include "booking.labels" $ | nindent 4 }}
  {{- $roleArn := index $.Values $service "roleArn" | default "" }}
  {{- if $roleArn }}
  annotations:
    eks.amazonaws.com/role-arn: {{ $roleArn }}
  {{- end }}
{{- end }}