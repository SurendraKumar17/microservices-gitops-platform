apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ .Release.Name }}-success-rate
  namespace: {{ .Release.Namespace }}
spec:
  args:
  - name: namespace
  metrics:
  - name: success-rate
    interval: 1m
    initialDelay: 1m
    successCondition: result[0] >= 0.95
    failureLimit: 3
    consecutiveErrorLimit: 5
    provider:
      prometheus:
        address: http://prometheus-stack-kube-prom-prometheus.monitoring.svc.cluster.local:9090
        query: |
          (
            sum(rate(http_requests_total{namespace="{{`{{args.namespace}}`}}",status!~"5.."}[5m])) or vector(0)
          )
          /
          (
            sum(rate(http_requests_total{namespace="{{`{{args.namespace}}`}}"}[5m])) or vector(1)
          )