{{- range $service := list "book" "user" "search" "frontend" }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $.Release.Name }}-{{ $service }}-hpa
  labels:
    {{- include "booking.labels" $ | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $.Release.Name }}-{{ $service }}
  minReplicas: {{ index $.Values $service "replicas" }}
  maxReplicas: {{ index $.Values $service "maxReplicas" }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300   # wait 5mins before scaling down
      policies:
      - type: Pods
        value: 1
        periodSeconds: 120
{{- end }}