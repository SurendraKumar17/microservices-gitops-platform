apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: booking-app-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/SurendraKumar17/microservices-gitops-platform
    targetRevision: develop
    path: helm/booking-app
    helm:
      valueFiles:
        - values.yaml                        # base defaults from helm/booking-app/values.yaml
        - ../../gitops/dev/values.yaml       # ← FIXED: was environments/dev, correct is dev
  destination:
    server: https://kubernetes.default.svc
    namespace: booking-dev                   # ← FIXED: was "dev", too generic
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: booking-app-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/SurendraKumar17/microservices-gitops-platform
    targetRevision: main
    path: helm/booking-app
    helm:
      valueFiles:
        - values.yaml
        - ../../gitops/prod/values.yaml      # ← FIXED: was pointing to dev for prod too
  destination:
    server: https://kubernetes.default.svc
    namespace: booking-prod                  # ← FIXED: was "prod", too generic
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true